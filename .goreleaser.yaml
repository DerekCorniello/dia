version: 2

project_name: dia

before:
  hooks:
    - go mod tidy
    - wails build -clean -trimpath -tags webkit2_41 -platform darwin/universal -o build/bin/dia-darwin-universal
    - wails build -clean -trimpath -tags webkit2_41 -platform linux/amd64 -o build/bin/dia-linux-amd64
    - wails build -clean -trimpath -tags webkit2_41 -platform linux/arm64 -o build/bin/dia-linux-arm64
    - wails build -clean -trimpath -tags webkit2_41 -platform windows/amd64 -o build/bin/dia-windows-amd64.exe
    - go run ./tools/gen-completions

builds:
  - id: dia
    skip: true

archives:
  - id: dia
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md
      - completions/*
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- if eq .Os "darwin" }}macos{{ else }}{{ .Os }}{{ end }}_
      {{- .Arch }}
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

release:
  github:
    owner: DerekCorniello
    name: dia

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: 'Bug fixes'
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'
